name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-timeout pytest-asyncio pytest-cov

      # Lint/format not enforced in CI — 621 pre-existing violations.
      # Pre-commit hooks catch new violations locally before push.
      # Full lint cleanup deferred to Phase 3.

      - name: Test
        run: pytest --tb=short --timeout=30
