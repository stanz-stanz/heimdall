[tool.pytest.ini_options]
testpaths = ["tests", "tools/twin/tests"]
markers = [
    "integration: marks tests that start real HTTP servers (deselect with '-m not integration')",
]
pythonpath = ["."]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 0

[dependency-groups]
dev = [
    "telethon>=1.42.0",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF"]

[tool.ruff.format]
quote-style = "double"
