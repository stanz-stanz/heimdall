[tool.pytest.ini_options]
testpaths = ["tests", "tools/twin/tests"]
markers = [
    "integration: marks tests that start real HTTP servers (deselect with '-m not integration')",
]
pythonpath = ["."]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 0

[dependency-groups]
dev = [
    "telethon>=1.42.0",
]
