# Shared log-driver config. Pi5 runs 24/7 on NVMe; unbounded json-file logs
# silently fill the disk over weeks. Cap every service at 10MB × 3 files.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.scheduler
    command: ["--mode", "daemon"]
    # Persistent daemon: BRPOPs queue:operator-commands for console dispatch.
    # One-shot prospect runs: docker compose run --rm scheduler --mode prospect --confirmed
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=scheduler
      - CLIENT_DATA_DIR=/data/clients
      - VALDI_DIR=/data/valdi
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-3}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - CERTSPOTTER_API_KEY=${CERTSPOTTER_API_KEY:-}
    volumes:
      - client-data:/data/clients
      - valdi-data:/data/valdi:ro
      - config-data:/config:ro
      - ../../data/input:/data/input:ro
      - ../../data/enriched:/data/enriched:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=worker
      - VALDI_DIR=/data/valdi
      - CLIENT_DATA_DIR=/data/clients
      - GRAYHATWARFARE_API_KEY=${GRAYHATWARFARE_API_KEY:-}
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-3}
      - WORKER_MAX_LEVEL=${WORKER_MAX_LEVEL:-0}
      - NUCLEI_TEMPLATES_DIR=/opt/nuclei-templates
      - VULNDB_PATH=/data/cache/vulndb.sqlite3
    volumes:
      - valdi-data:/data/valdi
      - client-data:/data/clients
      - ../../data/results:/data/results
      - cache-data:/data/cache
      - config-data:/config:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 330s  # 5 min subfinder + 20s stagger + 30s buffer
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(stat -c %Y /tmp/healthcheck 2>/dev/null || echo 0) )) -lt 300"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=api
      - RESULTS_DIR=/data/results
      - MESSAGES_DIR=/data/messages
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CONSOLE_USER=${CONSOLE_USER:-}
      - CONSOLE_PASSWORD=${CONSOLE_PASSWORD:-}
      - CLIENT_DATA_DIR=/data/clients
      - BRIEFS_DIR=/data/briefs
    volumes:
      - client-data:/data/clients:ro
      - ../../data/results:/data/results:ro
      - message-data:/data/messages
      - config-data:/config:ro
      - ../../data/output/briefs:/data/briefs:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  delivery:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.delivery
    command: ["--redis-url", "redis://redis:6379/0", "--db-path", "/data/clients/clients.db"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=delivery
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_OPERATOR_CHAT_ID=${TELEGRAM_OPERATOR_CHAT_ID:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CERTSPOTTER_API_KEY=${CERTSPOTTER_API_KEY:-}
    volumes:
      - client-data:/data/clients
      - message-data:/data/messages
      - config-data:/config:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r = redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379/0')); r.ping()"]
      interval: 30s
      timeout: 5s
      retries: 3

  twin:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.twin
    profiles: ["twin"]
    environment:
      - BRIEF_FILE=${BRIEF_FILE:-/config/conrads.dk.json}
    volumes:
      - ../../data/output/briefs:/config:ro
    ports:
      - "9080:9080"
      - "9443:9443"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: "no"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  dozzle:
    image: amir20/dozzle:v8.12.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    logging: *default-logging

volumes:
  # External on Pi5 so the rename/restructure safety net holds: volumes are
  # identified by their explicit `name:` below, not by the compose project
  # prefix. Dev overlay (docker-compose.dev.yml) re-declares these keys as
  # local auto-created volumes prefixed `heimdall_dev_*`.
  redis-data:
    external: true
    name: docker_redis-data
  client-data:
    external: true
    name: docker_client-data
  valdi-data:
    external: true
    name: docker_valdi-data
  cache-data:
    external: true
    name: docker_cache-data
  config-data:
    external: true
    name: docker_config-data
  message-data:
    external: true
    name: docker_message-data

networks:
  internal:
    driver: bridge
  # tailscale:
  #   external: true
  # Uncomment when Tailscale is installed and `docker network create tailscale` is run
