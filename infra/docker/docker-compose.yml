services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.scheduler
    command: ["--mode", "prospect", "--confirmed"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CLIENT_DATA_DIR=/data/clients
      - VALDI_DIR=/data/valdi
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-3}
    volumes:
      - client-data:/data/clients:ro
      - valdi-data:/data/valdi:ro
      - config-data:/config:ro
      - ../../data/input:/data/input:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  ct-collector:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ct-collector
    environment:
      - CT_DB_PATH=/data/ct/certificates.db
      - CERTSTREAM_URL=wss://certstream.calidog.io/
      - LOG_FORMAT=json
      - DOMAIN_FILTER=.dk
      - CLEANUP_INTERVAL_HOURS=24
      - STATUS_FILE=/data/ct/collector_status.json
    volumes:
      - ct-data:/data/ct
    networks:
      - internal  # outbound NAT required — CertStream WebSocket is external
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-m", "src.ct_collector.healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3

  ct-backfill:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ct-collector
    entrypoint: ["python", "-m", "src.ct_collector.backfill"]
    profiles: ["backfill"]  # Run with: docker compose --profile backfill run --rm ct-backfill
    environment:
      - CT_DB_PATH=/data/ct/certificates.db
      - LOG_FORMAT=json
    volumes:
      - ct-data:/data/ct
    networks:
      - internal  # outbound NAT required — fetches from crt.sh
    restart: "no"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - VALDI_DIR=/data/valdi
      - CLIENT_DATA_DIR=/data/clients
      - GRAYHATWARFARE_API_KEY=${GRAYHATWARFARE_API_KEY:-}
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-3}
      - CT_DB_PATH=/data/ct/certificates.db
      - WORKER_MAX_LEVEL=${WORKER_MAX_LEVEL:-0}
      - WPSCAN_API_TOKEN=${WPSCAN_API_TOKEN:-}
      - NUCLEI_TEMPLATES_DIR=/opt/nuclei-templates
    volumes:
      - valdi-data:/data/valdi
      - client-data:/data/clients:ro
      - result-data:/data/results
      - cache-data:/data/cache
      - config-data:/config:ro
      - ct-data:/data/ct:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 330s  # 5 min subfinder + 20s stagger + 30s buffer
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RESULTS_DIR=/data/results
      - MESSAGES_DIR=/data/messages
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLIENT_DATA_DIR=/data/clients
    volumes:
      - client-data:/data/clients:ro
      - result-data:/data/results:ro
      - message-data:/data/messages
      - config-data:/config:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    ports: []  # No inbound ports — Tailscale only
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  redis-data:
  client-data:
  valdi-data:
  result-data:
  cache-data:
  config-data:
  message-data:
  ct-data:
    # On Pi5: point to NVMe mount. Uncomment driver_opts when NVMe is mounted.
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /mnt/nvme/heimdall/ct-data

networks:
  internal:
    driver: bridge
  # tailscale:
  #   external: true
  # Uncomment when Tailscale is installed and `docker network create tailscale` is run
