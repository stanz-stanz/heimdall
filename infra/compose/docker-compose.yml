# Shared log-driver config. Pi5 runs 24/7 on NVMe; unbounded json-file logs
# silently fill the disk over weeks. Cap every service at 10MB × 3 files.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.scheduler
    image: heimdall-scheduler:${HEIMDALL_TAG:-latest}
    command: ["--mode", "daemon"]
    # Persistent daemon: BRPOPs queue:operator-commands for console dispatch.
    # One-shot prospect runs: docker compose run --rm scheduler --mode prospect --confirmed
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=scheduler
      - CLIENT_DATA_DIR=/data/clients
      - VALDI_DIR=/data/valdi
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-3}
    secrets:
      - claude_api_key
      - telegram_bot_token
      - certspotter_api_key
    volumes:
      - client-data:/data/clients
      - valdi-data:/data/valdi:ro
      - config-data:/config:ro
      - ${INPUT_HOST_DIR:-../../data/input}:/data/input:ro
      - ${ENRICHED_HOST_DIR:-../../data/enriched}:/data/enriched:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    # Daemon auto-restarts so operator-console "Run Pipeline" dispatches don't
    # silently go to dead air if the container exits (e.g. SIGKILL 137 during
    # a compose cycle). One-shot runs via `docker compose run --rm scheduler`
    # are unaffected — `compose run` uses ephemeral containers that ignore
    # the service restart policy.
    restart: unless-stopped
    logging: *default-logging

  worker:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.worker
    image: heimdall-worker:${HEIMDALL_TAG:-latest}
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=worker
      - VALDI_DIR=/data/valdi
      - CLIENT_DATA_DIR=/data/clients
      - ENRICHMENT_WORKERS=${ENRICHMENT_WORKERS:-3}
      - WORKER_MAX_LEVEL=${WORKER_MAX_LEVEL:-0}
      - NUCLEI_TEMPLATES_DIR=/opt/nuclei-templates
      - VULNDB_PATH=/data/cache/vulndb.sqlite3
    secrets:
      - grayhatwarfare_api_key
    volumes:
      - valdi-data:/data/valdi
      - client-data:/data/clients
      - ${RESULTS_HOST_DIR:-../../data/results}:/data/results
      - cache-data:/data/cache
      - config-data:/config:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    stop_grace_period: 330s  # 5 min subfinder + 20s stagger + 30s buffer
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(stat -c %Y /tmp/healthcheck 2>/dev/null || echo 0) )) -lt 300"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  api:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.api
    image: heimdall-api:${HEIMDALL_TAG:-latest}
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=api
      - RESULTS_DIR=/data/results
      - MESSAGES_DIR=/data/messages
      - CONSOLE_USER=${CONSOLE_USER:-}
      - CLIENT_DATA_DIR=/data/clients
      - BRIEFS_DIR=/data/briefs
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - SIGNUP_ALLOWED_ORIGINS=${SIGNUP_ALLOWED_ORIGINS:-}
    secrets:
      - telegram_bot_token
      - claude_api_key
      - console_password
    volumes:
      - client-data:/data/clients:ro
      - ${RESULTS_HOST_DIR:-../../data/results}:/data/results:ro
      - message-data:/data/messages
      - config-data:/config:ro
      - ${BRIEFS_HOST_DIR:-../../data/output/briefs}:/data/briefs:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  delivery:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.delivery
    image: heimdall-delivery:${HEIMDALL_TAG:-latest}
    command: ["--redis-url", "redis://redis:6379/0", "--db-path", "/data/clients/clients.db"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - HEIMDALL_SOURCE=delivery
      - TELEGRAM_OPERATOR_CHAT_ID=${TELEGRAM_OPERATOR_CHAT_ID:-}
    secrets:
      - telegram_bot_token
      - claude_api_key
      - certspotter_api_key
    volumes:
      - client-data:/data/clients
      - message-data:/data/messages
      - config-data:/config:ro
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r = redis.from_url(os.environ.get('REDIS_URL','redis://redis:6379/0')); r.ping()"]
      interval: 30s
      timeout: 5s
      retries: 3

  twin:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.twin
    image: heimdall-twin:${HEIMDALL_TAG:-latest}
    profiles: ["twin"]
    environment:
      - BRIEF_FILE=${BRIEF_FILE:-/config/conrads.dk.json}
    volumes:
      - ${BRIEFS_HOST_DIR:-../../data/output/briefs}:/config:ro
    ports:
      - "9080:9080"
      - "9443:9443"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: "no"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  dozzle:
    image: amir20/dozzle:v8.12.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    logging: *default-logging

volumes:
  # External on Pi5 so the rename/restructure safety net holds: volumes are
  # identified by their explicit `name:` below, not by the compose project
  # prefix. Dev overlay (docker-compose.dev.yml) re-declares these keys as
  # local auto-created volumes prefixed `heimdall_dev_*`.
  redis-data:
    external: true
    name: docker_redis-data
  client-data:
    external: true
    name: docker_client-data
  valdi-data:
    external: true
    name: docker_valdi-data
  cache-data:
    external: true
    name: docker_cache-data
  config-data:
    external: true
    name: docker_config-data
  message-data:
    external: true
    name: docker_message-data

networks:
  internal:
    driver: bridge
  # tailscale:
  #   external: true
  # Uncomment when Tailscale is installed and `docker network create tailscale` is run

# File-backed secrets. Files live in infra/compose/secrets/ on Pi5 (0600,
# gitignored). Dev overlay (docker-compose.dev.yml) points to secrets.dev/
# instead so dev + prod never share a source directory. Files are populated
# via scripts/migrate_env_to_secrets.sh on first run.
secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token
  claude_api_key:
    file: ./secrets/claude_api_key
  console_password:
    file: ./secrets/console_password
  certspotter_api_key:
    file: ./secrets/certspotter_api_key
  grayhatwarfare_api_key:
    file: ./secrets/grayhatwarfare_api_key
