# Heimdall dev stack overlay — Mac laptop only.
#
# Layered on top of docker-compose.yml via the root Makefile:
#
#   make dev-up
#
# which expands to:
#
#   docker compose -p heimdall_dev \
#     --env-file infra/compose/.env.dev \
#     -f infra/compose/docker-compose.yml \
#     -f infra/compose/docker-compose.dev.yml \
#     up -d --wait
#
# Convention: env files live next to the compose file at
# `infra/compose/.env` (prod) and `infra/compose/.env.dev` (dev). Both
# are gitignored; `.env.dev.example` is committed as a template.
#
# Isolation:
# - Project pinned to `heimdall_dev` so all volumes/networks are
#   prefixed `heimdall_dev_*`, never colliding with a Pi5 prod stack.
# - Secrets/tokens interpolated from `infra/compose/.env.dev` at render
#   time via the top-level --env-file flag. The prod compose file's
#   environment: blocks already use `${VAR:-}` placeholders — they pick
#   up dev values automatically, no per-service env_file block needed.
#
# Overrides vs prod:
# 1. redis publishes 6379 on the host so pytest integration tests can
#    connect from the Mac, push messages, and verify the real wire flow.
#    Prod keeps redis internal-only (no host publish).
# 2. worker replicas 3 → 1 (Mac laptop capacity).
# 3. api port 8000 → 8001 (avoid collision with any other local service).
# 4. dozzle moved behind `profiles: ["tools"]` so it is opt-in on Mac
#    (still unconditionally started on Pi5, which never sees this file).

services:
  redis:
    ports:
      - "6379:6379"

  worker:
    deploy:
      replicas: 1

  api:
    ports:
      - "8001:8000"

  dozzle:
    profiles: ["tools"]

# Dev volumes are local (auto-created by Compose) under the `heimdall_dev_*`
# prefix. Explicit `external: false` + dev `name:` override the base file's
# `external: true` + `name: docker_*` entries — Compose merge is field-wise,
# so an empty overlay does NOT override individual fields; must be explicit.
volumes:
  redis-data:
    external: false
    name: heimdall_dev_redis-data
  client-data:
    external: false
    name: heimdall_dev_client-data
  valdi-data:
    external: false
    name: heimdall_dev_valdi-data
  cache-data:
    external: false
    name: heimdall_dev_cache-data
  config-data:
    external: false
    name: heimdall_dev_config-data
  message-data:
    external: false
    name: heimdall_dev_message-data

# Dev secret sources point to secrets.dev/ so Mac dev and Pi5 prod never
# share a files-dir. make dev-secrets (auto-invoked by dev-up) materialises
# secrets.dev/* from infra/compose/.env.dev on first run.
secrets:
  telegram_bot_token:
    file: ./secrets.dev/telegram_bot_token
  claude_api_key:
    file: ./secrets.dev/claude_api_key
  console_password:
    file: ./secrets.dev/console_password
  certspotter_api_key:
    file: ./secrets.dev/certspotter_api_key
  grayhatwarfare_api_key:
    file: ./secrets.dev/grayhatwarfare_api_key
